<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a3a" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filter for accent elements -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for shield -->
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Terminal shadow -->
    <filter id="termShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0a0a1a"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.4"/>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>

  <!-- Vertical accent lines -->
  <line x1="440" y1="0" x2="440" y2="640" stroke="#00d4ff" stroke-width="0.3" opacity="0.1"/>

  <!-- Left decorative line -->
  <line x1="60" y1="180" x2="60" y2="460" stroke="#00d4ff" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- ===== SHIELD ICON (left side) ===== -->
  <g transform="translate(200, 240)" filter="url(#shieldGlow)">
    <!-- Shield outline -->
    <path d="M 0 -80 L 70 -55 L 70 20 Q 70 70 0 100 Q -70 70 -70 20 L -70 -55 Z"
          fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.9"/>

    <!-- Inner shield border -->
    <path d="M 0 -65 L 55 -43 L 55 15 Q 55 55 0 82 Q -55 55 -55 15 L -55 -43 Z"
          fill="#0a0a1a" fill-opacity="0.7" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>

    <!-- Circuit traces inside shield -->
    <!-- Horizontal lines -->
    <line x1="-35" y1="-20" x2="35" y2="-20" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="20" x2="30" y2="20" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

    <!-- Vertical traces -->
    <line x1="0" y1="-40" x2="0" y2="45" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="-30" x2="-20" y2="30" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
    <line x1="20" y1="-30" x2="20" y2="30" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>

    <!-- Circuit nodes (dots at intersections) -->
    <circle cx="0" cy="-20" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="0" cy="20" r="3" fill="#00d4ff" opacity="0.7"/>
    <circle cx="-20" cy="-20" r="2" fill="#00d4ff" opacity="0.6"/>
    <circle cx="20" cy="-20" r="2" fill="#00d4ff" opacity="0.6"/>
    <circle cx="-20" cy="0" r="2" fill="#00d4ff" opacity="0.5"/>
    <circle cx="20" cy="0" r="2" fill="#00d4ff" opacity="0.5"/>
    <circle cx="-20" cy="20" r="2" fill="#00d4ff" opacity="0.4"/>
    <circle cx="20" cy="20" r="2" fill="#00d4ff" opacity="0.4"/>

    <!-- Lock body -->
    <rect x="-14" y="5" width="28" height="22" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>

    <!-- Lock shackle -->
    <path d="M -8 5 L -8 -5 Q -8 -15 0 -15 Q 8 -15 8 -5 L 8 5"
          fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>

    <!-- Lock keyhole -->
    <circle cx="0" cy="14" r="3" fill="#00d4ff" opacity="0.6"/>
    <line x1="0" y1="17" x2="0" y2="23" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ===== TITLE TEXT ===== -->
  <text x="640" y="200" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    AgentGuard
  </text>

  <!-- Subtitle -->
  <text x="640" y="250" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
        font-size="22" fill="#00d4ff" text-anchor="middle" letter-spacing="4" opacity="0.9">
    AI AGENT SUPPLY CHAIN SECURITY
  </text>

  <!-- Thin accent line under subtitle -->
  <line x1="440" y1="270" x2="840" y2="270" stroke="#00d4ff" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- ===== TERMINAL MOCKUP (right-ish, centered below) ===== -->
  <g transform="translate(440, 310)" filter="url(#termShadow)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="480" height="180" rx="8" fill="#111128" stroke="#1e1e3a" stroke-width="1.5"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="480" height="32" rx="8" fill="#1a1a36"/>
    <rect x="0" y="24" width="480" height="8" fill="#1a1a36"/>

    <!-- Window dots -->
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>

    <!-- Title bar text -->
    <text x="240" y="20" font-family="'SF Mono', 'Fira Code', monospace" font-size="11"
          fill="#666688" text-anchor="middle">agentguard</text>

    <!-- Terminal content -->
    <!-- Command line -->
    <text x="18" y="62" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="14">
      <tspan fill="#28c840">$</tspan>
      <tspan fill="#c0c0d0"> agentguard scan </tspan>
      <tspan fill="#f8d76e">"npm install lodasx"</tspan>
    </text>

    <!-- Warning output -->
    <text x="18" y="92" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="14">
      <tspan fill="#ff5f57">[HIGH]</tspan>
      <tspan fill="#c0c0d0"> typosquat: </tspan>
      <tspan fill="#f8d76e">'lodasx'</tspan>
      <tspan fill="#c0c0d0"> looks like </tspan>
      <tspan fill="#28c840">'lodash'</tspan>
    </text>

    <!-- BLOCKED -->
    <text x="18" y="130" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
          font-size="18" font-weight="700" fill="#ff5f57" letter-spacing="3">
      BLOCKED
    </text>

    <!-- Blinking cursor line -->
    <text x="18" y="162" font-family="'SF Mono', 'Fira Code', monospace" font-size="14">
      <tspan fill="#28c840">$</tspan>
      <tspan fill="#00d4ff" opacity="0.7">_</tspan>
    </text>
  </g>

  <!-- Bottom accent line -->
  <line x1="100" y1="560" x2="1180" y2="560" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner accents -->
  <polyline points="20,40 20,20 40,20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <polyline points="1240,20 1260,20 1260,40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <polyline points="20,600 20,620 40,620" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <polyline points="1240,620 1260,620 1260,600" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative dots -->
  <circle cx="100" cy="580" r="1.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="120" cy="580" r="1.5" fill="#00d4ff" opacity="0.2"/>
  <circle cx="140" cy="580" r="1.5" fill="#00d4ff" opacity="0.1"/>

  <circle cx="1140" cy="580" r="1.5" fill="#00d4ff" opacity="0.1"/>
  <circle cx="1160" cy="580" r="1.5" fill="#00d4ff" opacity="0.2"/>
  <circle cx="1180" cy="580" r="1.5" fill="#00d4ff" opacity="0.3"/>
</svg>